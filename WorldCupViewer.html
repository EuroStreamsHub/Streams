<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 | Viewer</title>
<style>
  :root { --primary:#0072db; --bg:#0a0a0a; --surface:#1a1a1a; --text:#ffffff; --border:#2a2d35; }
  body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; align-items:center; }
  .top-nav { width:100%; padding:1rem 4%; display:flex; align-items:center; box-sizing:border-box; }
  .back-button { text-decoration:none; color:#fff; background:rgba(255,255,255,0.1); padding:8px 16px; border-radius:6px; font-weight:bold; }
  h2 { margin:0.5rem 1rem 1rem; font-size:1.5rem; letter-spacing:-0.5px; text-align:center; }
  .cinema-wrapper { width:95%; max-width:1200px; box-shadow:0 0 30px rgba(0,114,219,0.2); border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#000; }
  .stream-container { width:100%; aspect-ratio:16/9; position:relative; }
  iframe { width:100%; height:100%; border:none; }
  .mirrors-section { width:95%; max-width:1200px; margin:1rem 0 3rem; }
  .mirrors-label { color:#888; font-size:0.85rem; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
  .mirrors-grid { display:flex; flex-wrap:wrap; gap:8px; }
  .mirror-btn {
    background:#1a1c22; border:1px solid var(--border); color:white;
    padding:10px 16px; cursor:pointer; border-radius:6px; font-size:0.9rem;
    transition:.2s;
  }
  .mirror-btn:hover { border-color:var(--primary); }
  .mirror-btn.active { border-color:var(--primary); color:var(--primary); background:#0f1730; }
  .loader {
    position:absolute; top:50%; left:50%; width:50px; height:50px;
    border:3px solid rgba(255,255,255,0.1); border-top:3px solid var(--primary);
    border-radius:50%; animation:spin 1s linear infinite;
    transform:translate(-50%,-50%); z-index:1;
  }
  @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
  .error { text-align:center; padding:2rem; color:#888; }
</style>
</head>
<body>

<div class="top-nav">
  <a class="back-button" href="javascript:history.back()">⬅ Back</a>
</div>

<h2 id="title">Loading…</h2>

<div class="cinema-wrapper">
  <div class="stream-container">
    <div id="loader" class="loader"></div>
    <iframe id="player" allowfullscreen referrerpolicy="unsafe-url"></iframe>
  </div>
</div>

<div class="mirrors-section">
  <div class="mirrors-label">Streams</div>
  <div class="mirrors-grid" id="mirrors"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const slug = params.get("slug");
const titleParam = params.get("title");
const player = document.getElementById("player");
const loader = document.getElementById("loader");
const mirrorsDiv = document.getElementById("mirrors");

document.getElementById("title").textContent = titleParam || "Live Match";
document.title = titleParam || "World Cup 2026";

let currentUrl = "";

function loadStream(url, btnEl) {
  loader.style.display = "block";
  currentUrl = url;
  player.src = url;
  document.querySelectorAll(".mirror-btn").forEach(b => b.classList.remove("active"));
  if (btnEl) btnEl.classList.add("active");
}

player.onload = () => { loader.style.display = "none"; };

async function init() {
  if (!slug) {
    document.getElementById("title").textContent = "No match specified";
    loader.style.display = "none";
    return;
  }

  try {
    const res = await fetch(`https://api.nuevasantino.xyz/api/watch/${encodeURIComponent(slug)}`);
    const data = await res.json();
    const item = data.item;

    if (!item) throw new Error("Not found");

    document.getElementById("title").textContent = item.name;
    document.title = item.name;

    const streams = item.streams || [];

    if (!streams.length) {
      mirrorsDiv.innerHTML = '<div class="error">No streams available yet.</div>';
      loader.style.display = "none";
      return;
    }

    streams.forEach((s, i) => {
      const btn = document.createElement("button");
      btn.className = "mirror-btn";
      btn.textContent = s.name;
      btn.onclick = () => loadStream(s.url, btn);
      mirrorsDiv.appendChild(btn);
      if (i === 0) {
        btn.classList.add("active");
        loadStream(s.url, btn);
      }
    });

  } catch(err) {
    loader.style.display = "none";
    mirrorsDiv.innerHTML = '<div class="error">Failed to load streams.</div>';
  }
}

init();
</script>
</body>
</html>
