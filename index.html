<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAM HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e50914;
    --gold: #f5c518;
    --bg: #080808;
    --surface: #111111;
    --border: rgba(255,255,255,0.07);
    --text: #ffffff;
    --muted: #666;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── TICKER ── */
  .ticker-wrap {
    position: sticky; top: 0; z-index: 100;
    background: #000;
    border-bottom: 1px solid var(--border);
    height: 40px; overflow: hidden;
    display: flex; align-items: center;
  }
  .ticker-label {
    background: var(--red);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    padding: 0 16px;
    height: 100%;
    display: flex; align-items: center;
    flex-shrink: 0;
    z-index: 1;
  }
  .ticker-scroll { overflow: hidden; flex: 1; }
  .ticker {
    display: inline-block; white-space: nowrap;
    animation: ticker-anim 40s linear infinite;
    padding-left: 100%;
  }
  .ticker-item {
    display: inline-block; padding: 0 3rem;
    font-size: 0.78rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1px;
    cursor: pointer; color: #aaa;
    transition: color 0.2s;
  }
  .ticker-item:hover { color: #fff; }
  .ticker-item strong { color: var(--gold); margin-right: 8px; }
  @keyframes ticker-anim { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  /* ── HERO ── */
  .hero {
    position: relative;
    padding: 5rem 6% 3rem;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, rgba(229,9,20,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 10px;
  }
  .hero-eyebrow::before {
    content: '';
    display: block; width: 30px; height: 1px;
    background: var(--red);
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 14vw, 11rem);
    line-height: 0.9;
    letter-spacing: -2px;
    color: #fff;
  }
  .hero h1 em {
    font-style: normal;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.3);
  }
  .hero-sub {
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 400;
  }

  /* ── DONATION STRIP ── */
  .donate-strip {
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    padding: 1.2rem 6%;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .donate-label {
    font-size: 0.65rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
    flex-shrink: 0;
  }
  .crypto-icons { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .crypto-icons img {
    width: 24px; height: 24px; cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
    filter: grayscale(40%);
    border-radius: 50%;
  }
  .crypto-icons img:hover { transform: translateY(-3px) scale(1.15); filter: grayscale(0%); }
  .bmc-wrap { margin-left: auto; }

  /* ── SECTION HEADER ── */
  .section-header {
    padding: 3rem 6% 1.5rem;
    display: flex; align-items: baseline; gap: 16px;
  }
  .section-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 3px;
    color: #fff;
  }
  .section-header span {
    font-size: 0.7rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }

  /* ── CARD GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    padding: 0 6% 6rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  @media (max-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

  .card {
    position: relative;
    aspect-ratio: 4/3;
    cursor: pointer;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .card-img {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.5s;
    filter: brightness(0.35) saturate(0.6);
  }
  .card:hover .card-img {
    transform: scale(1.07);
    filter: brightness(0.25) saturate(0.4);
  }

  .card-content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: 2rem;
  }

  .card-tag {
    font-size: 0.6rem; letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--red); font-weight: 700;
    margin-bottom: 0.5rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s 0.1s, transform 0.3s 0.1s;
  }
  .card:hover .card-tag { opacity: 1; transform: translateY(0); }

  .card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 3.5vw, 2.8rem);
    letter-spacing: 1px; line-height: 1;
    color: #fff;
    transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .card:hover h2 { transform: translateY(-4px); }

  .card-arrow {
    margin-top: 1rem;
    display: flex; align-items: center; gap: 8px;
    font-size: 0.7rem; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(255,255,255,0.4);
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.3s 0.15s, transform 0.3s 0.15s;
  }
  .card:hover .card-arrow { opacity: 1; transform: translateY(0); }
  .card-arrow::after { content: '→'; font-size: 1rem; }

  /* Card accent line */
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--red);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .card:hover::after { transform: scaleX(1); }

  /* ── MODAL ── */
  #cryptoModal {
    display: none; position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    background: #0e0e0e;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 2rem; border-radius: 4px;
    z-index: 2000; text-align: center;
    box-shadow: 0 25px 80px rgba(0,0,0,0.8);
    width: 340px;
    transition: transform 0.2s;
  }
  #cryptoModal.visible { transform: translate(-50%, -50%) scale(1); }
  #cryptoModal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 2px;
    color: var(--gold); margin-bottom: 1rem;
  }
  #mAddr {
    font-size: 0.72rem; background: #000;
    padding: 12px; border-radius: 4px;
    margin: 0 0 1rem; word-break: break-all;
    color: #777; border: 1px solid #222;
    font-family: monospace;
  }
  .modal-btns { display: flex; flex-direction: column; gap: 8px; }
  .m-btn {
    border: none; padding: 12px; border-radius: 4px;
    font-weight: 700; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; letter-spacing: 1px;
    text-transform: uppercase; transition: opacity 0.2s;
  }
  .m-btn:hover { opacity: 0.85; }
  .btn-open { background: var(--gold); color: #000; }
  .btn-copy { background: var(--red); color: #fff; }
  .btn-close { background: transparent; color: var(--muted); font-size: 0.75rem; margin-top: 4px; }
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 1999;
    backdrop-filter: blur(4px);
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 6%;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    font-size: 0.72rem; color: var(--muted);
    letter-spacing: 1px;
  }
  footer strong { color: rgba(255,255,255,0.3); font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; font-size: 1rem; }
  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: #22c55e;
    margin-right: 6px; animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  }

  /* ── PAGE LOAD ANIMATION ── */
  .card { opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s forwards; }
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-label">LIVE</div>
  <div class="ticker-scroll"><div class="ticker" id="tickerBody">Loading…</div></div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">All Access</div>
  <h1>STREAM<br><em>HUB</em></h1>
  <p class="hero-sub">Live Football &nbsp;·&nbsp; Cinema &nbsp;·&nbsp; Television</p>
</div>

<!-- DONATE STRIP -->
<div class="donate-strip">
  <span class="donate-label">Support</span>
  <div class="crypto-icons">
    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons/svg/color/btc.svg"  onclick="openCryp('Bitcoin',  'Bc1qtyl36xj24c2lw3udrxzm4hmcgqkswtsyrue2s0','bitcoin')"   title="BTC">
    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons/svg/color/eth.svg"  onclick="openCryp('Ethereum', '0x1b2434211e081cb50effb9e724ad594519d9d271','ethereum')"  title="ETH">
    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons/svg/color/sol.svg"  onclick="openCryp('Solana',   'BFzbhLCPJUPNwVUFbQ1nYcyBUpNZX5bHMU9616ZPyZ6o','solana')" title="SOL">
    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons/svg/color/usdt.svg" onclick="openCryp('USDT (Sol)','BFzbhLCPJUPNwVUFbQ1nYcyBUpNZX5bHMU9616ZPyZ6o','solana')" title="USDT">
    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons/svg/color/ltc.svg"  onclick="openCryp('Litecoin', 'ltc1q84heskg9zz4cadtprln8vkuvd9l2a2lmg8ekfe','litecoin')" title="LTC">
    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons/svg/color/trx.svg"  onclick="openCryp('Tron',     'TMS7nvzSh7zy7bHaLTb8qp9Xr257k9gcoV','tron')"             title="TRX">
    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons/svg/color/bnb.svg"  onclick="openCryp('BNB (BSC)','0x1b2434211e081cb50effb9e724ad594519d9d271','ethereum')"   title="BNB">
    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons/svg/color/matic.svg"onclick="openCryp('Polygon',  '0x1b2434211e081cb50effb9e724ad594519d9d271','ethereum')"   title="MATIC">
    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons/svg/color/doge.svg" onclick="openCryp('Dogecoin', 'DMQ8ZsRY7ThLdEjpNs6yyAWH8nXXrUuKod','dogecoin')"         title="DOGE">
  </div>
  <div class="bmc-wrap">
    <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js"
      data-name="bmc-button" data-slug="sufclive" data-color="#FFDD00"
      data-emoji="🐔🍷" data-font="Cookie" data-text="Buy me a chicken wine"
      data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff">
    </script>
  </div>
</div>

<!-- SECTION LABEL -->
<div class="section-header">
  <h2>Browse</h2>
  <span>Choose your content</span>
</div>

<!-- CARDS -->
<div class="grid">
  <div class="card" onclick="location.href='streams2.html'">
    <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=1200');"></div>
    <div class="card-content">
      <div class="card-tag">Live Matches</div>
      <h2>Football<br>Streams</h2>
      <div class="card-arrow">Watch Now</div>
    </div>
  </div>

  <div class="card" onclick="location.href='movies.html'">
    <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200');"></div>
    <div class="card-content">
      <div class="card-tag">On Demand</div>
      <h2>Movies &amp;<br>Series</h2>
      <div class="card-arrow">Browse</div>
    </div>
  </div>

  <div class="card" onclick="location.href='sheep.html'">
    <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=1200');"></div>
    <div class="card-content">
      <div class="card-tag">Anime</div>
      <h2>Sheep Detective</h2>
      <div class="card-arrow">Watch</div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <strong>STREAM HUB</strong>
  <span><span class="status-dot"></span>All systems operational</span>
</footer>

<!-- CRYPTO MODAL OVERLAY -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>

<!-- CRYPTO MODAL -->
<div id="cryptoModal">
  <h3 id="mCoin"></h3>
  <div id="mAddr"></div>
  <div class="modal-btns">
    <button class="m-btn btn-open"  id="mOpen">Launch Wallet</button>
    <button class="m-btn btn-copy"  id="mCopy">Copy Address</button>
    <button class="m-btn btn-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  const TMDB_KEY = "12955008668c12c07496b04132f9ce44";
  let curA = "", curP = "";

  function openCryp(name, addr, proto) {
    curA = addr; curP = proto;
    document.getElementById('mCoin').innerText = name;
    document.getElementById('mAddr').innerText = addr;
    const modal = document.getElementById('cryptoModal');
    document.getElementById('modalOverlay').style.display = 'block';
    modal.style.display = 'block';
    requestAnimationFrame(() => modal.classList.add('visible'));
    document.getElementById('mOpen').onclick = () => window.location.href = `${proto}:${addr}`;
    document.getElementById('mCopy').onclick = () => {
      navigator.clipboard.writeText(curA);
      const b = document.getElementById('mCopy');
      b.innerText = "COPIED!";
      setTimeout(() => b.innerText = "Copy Address", 2000);
    };
  }

  function closeModal() {
    const modal = document.getElementById('cryptoModal');
    modal.classList.remove('visible');
    setTimeout(() => {
      modal.style.display = 'none';
      document.getElementById('modalOverlay').style.display = 'none';
    }, 200);
  }

  async function initTicker() {
    try {
      const [mRes, tRes] = await Promise.all([
        fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB_KEY}`),
        fetch(`https://api.themoviedb.org/3/trending/tv/day?api_key=${TMDB_KEY}`)
      ]);
      const mD = await mRes.json();
      const tD = await tRes.json();
      let html = "";
      html += `<span class="ticker-item"><strong>TRENDING MOVIE</strong>${mD.results[0].title}</span>`;
      html += `<span class="ticker-item"><strong>HOT SERIES</strong>${tD.results[0].name}</span>`;
      if (mD.results[1]) html += `<span class="ticker-item"><strong>ALSO TRENDING</strong>${mD.results[1].title}</span>`;
      if (tD.results[1]) html += `<span class="ticker-item"><strong>NEW SERIES</strong>${tD.results[1].name}</span>`;
      document.getElementById('tickerBody').innerHTML = html + html;
    } catch(e) {
      document.getElementById('tickerBody').innerHTML =
        '<span class="ticker-item"><strong>WELCOME</strong>Stream Hub — All Systems Nominal</span>';
    }
  }
  initTicker();
</script>
</body>
</html>
