<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAM HUB | Movies &amp; Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e50914;
    --gold: #f5c518;
    --bg: #080808;
    --surface: #111;
    --surface2: #161616;
    --border: rgba(255,255,255,0.07);
    --text: #fff;
    --muted: #555;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    height: 64px;
    background: rgba(8,8,8,0.96);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    display: flex; align-items: center;
    padding: 0 4%; gap: 16px;
  }

  .back {
    color: var(--text); text-decoration: none;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 4px;
    font-size: 0.8rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    transition: background 0.2s; flex-shrink: 0;
  }
  .back:hover { background: rgba(255,255,255,0.12); }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 3px;
    color: #fff; flex-shrink: 0;
  }
  .logo span { color: var(--red); }

  /* Type toggle */
  .type-toggle {
    display: flex;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .type-btn {
    padding: 7px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    border: none; cursor: pointer;
    background: transparent; color: var(--muted);
    transition: all 0.2s;
  }
  .type-btn.active { background: var(--red); color: #fff; }

  /* Search */
  .search-wrap {
    flex: 1; max-width: 360px; position: relative; margin-left: auto;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  input#search {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 9px 12px 9px 38px;
    border-radius: 4px;
    color: #fff; outline: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    transition: border-color 0.2s, background 0.2s;
  }
  input#search:focus { border-color: var(--red); background: rgba(229,9,20,0.06); }
  input#search::placeholder { color: var(--muted); }

  /* ── MAIN ── */
  main { padding-top: 64px; }

  /* Section heading */
  .section-head {
    padding: 2.5rem 4% 1.5rem;
    display: flex; align-items: baseline; gap: 12px;
  }
  .section-head h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem; letter-spacing: 3px;
  }
  .section-head h2 em { font-style: normal; color: var(--red); }
  .section-head span {
    font-size: 0.7rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    padding-bottom: 4rem;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }

  .card {
    background: var(--surface);
    cursor: pointer;
    overflow: hidden;
    transition: background 0.2s;
    opacity: 0;
    animation: fadeIn 0.4s forwards;
  }
  .card:hover { background: var(--surface2); }

  .poster {
    width: 100%;
    aspect-ratio: 2/3;
    background-size: cover;
    background-position: center;
    background-color: #1a1a1a;
    position: relative;
    overflow: hidden;
  }
  .poster::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 40%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover .poster::after { opacity: 1; }

  .play-icon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s; z-index: 1;
  }
  .play-icon svg { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8)); }
  .card:hover .play-icon { opacity: 1; }

  .rating-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 0.65rem; font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
    z-index: 1;
  }

  .card-info {
    padding: 0.75rem 0.8rem 0.9rem;
  }
  .card-title {
    font-weight: 700; font-size: 0.88rem;
    line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .card-meta {
    font-size: 0.72rem; color: var(--muted);
    display: flex; gap: 8px;
  }

  /* State messages */
  .state-msg {
    grid-column: 1/-1;
    padding: 5rem 2rem;
    text-align: center; color: var(--muted);
    font-size: 0.85rem; letter-spacing: 2px;
    text-transform: uppercase;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,255,255,0.06);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">← Back</a>
  <div class="logo">STREAM<span>HUB</span></div>

  <div class="type-toggle">
    <button class="type-btn active" id="btnMovie" onclick="switchType('movie')">Movies</button>
    <button class="type-btn"        id="btnTV"    onclick="switchType('tv')">Series</button>
  </div>

  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" placeholder="Search titles…" oninput="handleSearch()">
  </div>
</header>

<main>
  <div class="section-head">
    <h2 id="sectionTitle">Trending <em>Movies</em></h2>
    <span id="resultCount"></span>
  </div>
  <div id="grid" class="grid">
    <div class="state-msg"><div class="spinner"></div>Loading…</div>
  </div>
</main>

<script>
const API_KEY   = "12955008668c12c07496b04132f9ce44";
const IMG_BASE  = "https://image.tmdb.org/t/p/w500";
const IMG_LARGE = "https://image.tmdb.org/t/p/w780";

let currentType = 'movie';
let searchTimeout = null;

async function playContent(id, title) {
  if (currentType === 'movie') {
    const res  = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}`);
    const data = await res.json();
    location.href = `moviesviewer.html?type=movie&imdb=${data.imdb_id}&title=${encodeURIComponent(title)}`;
  } else {
    location.href = `moviesviewer.html?type=tv&id=${id}&title=${encodeURIComponent(title)}`;
  }
}

function switchType(type) {
  currentType = type;
  document.getElementById('btnMovie').classList.toggle('active', type === 'movie');
  document.getElementById('btnTV').classList.toggle('active', type === 'tv');
  document.getElementById('search').value = '';
  loadTrending();
}

async function loadTrending() {
  setLoading();
  const res  = await fetch(`https://api.themoviedb.org/3/trending/${currentType}/week?api_key=${API_KEY}`);
  const data = await res.json();
  updateHeader(`Trending <em>${currentType === 'movie' ? 'Movies' : 'Series'}</em>`);
  renderGrid(data.results);
}

function handleSearch() {
  const q = document.getElementById('search').value.trim();
  if (!q) { loadTrending(); return; }
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(async () => {
    setLoading();
    const res  = await fetch(`https://api.themoviedb.org/3/search/${currentType}?api_key=${API_KEY}&query=${encodeURIComponent(q)}`);
    const data = await res.json();
    updateHeader(`Results for <em>"${q}"</em>`);
    renderGrid(data.results);
  }, 300);
}

function updateHeader(html) {
  document.getElementById('sectionTitle').innerHTML = html;
}

function setLoading() {
  document.getElementById('grid').innerHTML =
    '<div class="state-msg"><div class="spinner"></div>Loading…</div>';
  document.getElementById('resultCount').textContent = '';
}

function renderGrid(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const filtered = list.filter(item => item.poster_path);

  document.getElementById('resultCount').textContent =
    filtered.length ? `${filtered.length} titles` : '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="state-msg">No results found.</div>';
    return;
  }

  filtered.forEach((item, i) => {
    const title = item.title || item.name;
    const year  = (item.release_date || item.first_air_date || '').split('-')[0];
    const rating = item.vote_average ? item.vote_average.toFixed(1) : null;

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i * 0.03, 0.6)}s`;

    card.innerHTML = `
      <div class="poster" style="background-image:url(${IMG_BASE}${item.poster_path})">
        ${rating ? `<div class="rating-badge">★ ${rating}</div>` : ''}
        <div class="play-icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="white" opacity="0.9">
            <circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
            <polygon points="10,8 16,12 10,16" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${title}</div>
        <div class="card-meta">
          <span>${year || '—'}</span>
          <span>${currentType === 'movie' ? 'Film' : 'Series'}</span>
        </div>
      </div>
    `;
    card.onclick = () => playContent(item.id, title);
    grid.appendChild(card);
  });
}

loadTrending();
</script>
</body>
</html>
