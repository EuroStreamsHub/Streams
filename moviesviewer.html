<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAM HUB | Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e50914;
    --gold: #f5c518;
    --bg: #080808;
    --surface: #111;
    --surface2: #161616;
    --border: rgba(255,255,255,0.07);
    --text: #fff;
    --muted: #555;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ── NAV ── */
  nav {
    width: 100%;
    padding: 1rem 4%;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,8,0.96);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }

  .back {
    text-decoration: none; color: var(--text);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 4px;
    font-size: 0.8rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    transition: background 0.2s;
  }
  .back:hover { background: rgba(255,255,255,0.12); }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 3px;
  }
  .logo span { color: var(--red); }

  /* ── TITLE ── */
  .title-wrap {
    width: 95%; max-width: 1100px;
    padding: 1.5rem 0 1rem;
    text-align: center;
  }
  .content-label {
    font-size: 0.65rem; letter-spacing: 4px;
    text-transform: uppercase; color: var(--red);
    margin-bottom: 0.5rem;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 2px; line-height: 1;
  }

  /* ── PLAYER ── */
  .player-wrap {
    width: 95%; max-width: 1100px;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .aspect {
    position: relative;
    aspect-ratio: 16/9;
  }
  iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .loader {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000; z-index: 2;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(255,255,255,0.06);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SERIES CONTROLS ── */
  .series-section {
    width: 95%; max-width: 1100px;
    margin: 1.2rem 0 3rem;
  }

  .controls-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .controls-label {
    font-size: 0.65rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
  }

  select#seasonSelect {
    background: var(--surface);
    border: 1px solid var(--border);
    color: #fff;
    padding: 8px 14px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; outline: none;
    transition: border-color 0.2s;
  }
  select#seasonSelect:focus { border-color: var(--red); }
  select#seasonSelect option { background: #111; }

  .ep-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }

  .ep-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    transition: all 0.2s;
  }
  .ep-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); background: var(--surface2); }
  .ep-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
</style>
</head>
<body>

<nav>
  <a class="back" href="movies.html">← Back</a>
  <div class="logo">STREAM<span>HUB</span></div>
</nav>

<div class="title-wrap">
  <div class="content-label" id="contentLabel">Film</div>
  <h1 id="title">Loading…</h1>
</div>

<div class="player-wrap">
  <div class="aspect">
    <div class="loader" id="loader"><div class="spinner"></div></div>
    <iframe id="player" allowfullscreen></iframe>
  </div>
</div>

<div class="series-section" id="seriesSection" style="display:none;">
  <div class="controls-row">
    <span class="controls-label">Season</span>
    <select id="seasonSelect" onchange="loadEpisodes()"></select>
  </div>
  <div class="ep-grid" id="epGrid"></div>
</div>

<script>
  const TMDB_KEY = "12955008668c12c07496b04132f9ce44";
  const params   = new URLSearchParams(location.search);
  const type     = params.get("type");
  const id       = params.get("id");
  const imdb     = params.get("imdb");
  const title    = params.get("title") || "Now Playing";
  const player   = document.getElementById("player");
  const loader   = document.getElementById("loader");

  document.getElementById("title").textContent = title;
  document.getElementById("contentLabel").textContent =
    type === 'tv' ? 'Series' : 'Film';

  player.onload = () => loader.style.display = "none";

  async function init() {
    if (type === "tv") {
      document.getElementById("seriesSection").style.display = "block";
      const res  = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_KEY}`);
      const data = await res.json();
      const sel  = document.getElementById("seasonSelect");

      data.seasons.forEach(s => {
        if (s.season_number < 1) return;
        const opt = document.createElement("option");
        opt.value = s.season_number;
        opt.textContent = `Season ${s.season_number}`;
        sel.appendChild(opt);
      });
      loadEpisodes();
    } else {
      player.src = `https://vidfast.pro/movie/${imdb}`;
    }
  }

  async function loadEpisodes() {
    const s   = document.getElementById("seasonSelect").value;
    const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${TMDB_KEY}`);
    const data = await res.json();
    const grid = document.getElementById("epGrid");
    grid.innerHTML = "";
    loader.style.display = "flex";

    data.episodes.forEach(ep => {
      const btn = document.createElement("button");
      btn.className = "ep-btn";
      btn.textContent = ep.episode_number;
      btn.title = ep.name || `Episode ${ep.episode_number}`;
      btn.onclick = () => {
        document.querySelectorAll(".ep-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        loader.style.display = "flex";
        player.src = `https://vidfast.pro/tv/${id}/${s}/${ep.episode_number}`;
      };
      grid.appendChild(btn);
    });

    if (grid.firstChild) grid.firstChild.click();
  }

  init();
</script>
</body>
</html>
