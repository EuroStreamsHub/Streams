<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; }
    .wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe
      src="https://drive.google.com/file/d/1sPbXoboh4ZyMVRNy3OIxVmnQJyfyu1Sm/preview"
      allow="autoplay"
      allowfullscreen
    ></iframe>
  </div>
</body>
</html>
