<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPORT HUB | Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #0072db;
    --red: #e50914;
    --bg: #080808;
    --surface: #111;
    --surface2: #161616;
    --border: rgba(255,255,255,0.07);
    --text: #fff;
    --muted: #555;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── NAV ── */
  nav {
    width: 100%;
    padding: 1rem 4%;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,8,0.95);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }

  .back {
    text-decoration: none; color: var(--text);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 4px;
    font-size: 0.8rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    transition: background 0.2s;
  }
  .back:hover { background: rgba(255,255,255,0.12); }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 3px;
  }
  .logo span { color: var(--blue); }

  /* ── TITLE ── */
  .title-wrap {
    width: 95%; max-width: 1100px;
    padding: 1.5rem 0 1rem;
    text-align: center;
  }
  .match-label {
    font-size: 0.65rem; letter-spacing: 4px;
    text-transform: uppercase; color: var(--red);
    margin-bottom: 0.5rem;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--red);
    animation: pulse-red 1.2s infinite;
  }
  @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.3} }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    letter-spacing: 2px;
    line-height: 1;
  }

  /* ── PLAYER ── */
  .player-wrap {
    width: 95%; max-width: 1100px;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .aspect {
    position: relative;
    aspect-ratio: 16/9;
  }
  iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .loader {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000; z-index: 2;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(255,255,255,0.06);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CHANNELS ── */
  .channels-wrap {
    width: 95%; max-width: 1100px;
    margin: 1.2rem 0 3rem;
  }
  .channels-label {
    font-size: 0.65rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 0.8rem;
  }
  .channels-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .ch-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
  }
  .ch-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); background: var(--surface2); }
  .ch-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  .no-sources {
    color: var(--muted); font-size: 0.85rem;
    padding: 1rem 0; letter-spacing: 1px;
  }
</style>
</head>
<body>

<nav>
  <a class="back" href="streams2.html">← Back</a>
  <div class="logo">SPORT<span>HUB</span></div>
</nav>

<div class="title-wrap">
  <div class="match-label"><span class="live-dot"></span>Live Match</div>
  <h1 id="title">Loading…</h1>
</div>

<div class="player-wrap">
  <div class="aspect">
    <div class="loader" id="loader"><div class="spinner"></div></div>
    <iframe id="player"
      allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox">
    </iframe>
  </div>
</div>

<div class="channels-wrap">
  <div class="channels-label">Channels</div>
  <div class="channels-grid" id="mirrorGrid"></div>
</div>

<script>
  const params  = new URLSearchParams(location.search);
  const title   = params.get("title") || "Live Event";
  const sources = JSON.parse(decodeURIComponent(params.get("sources") || "[]"));

  const player = document.getElementById("player");
  const loader = document.getElementById("loader");
  const grid   = document.getElementById("mirrorGrid");

  document.getElementById("title").textContent = title;

  function load(url, btn) {
    loader.style.display = "flex";
    player.src = url;
    document.querySelectorAll(".ch-btn").forEach(b => b.classList.remove("active"));
    if (btn) btn.classList.add("active");
  }

  player.onload = () => loader.style.display = "none";

  if (sources.length === 0) {
    grid.innerHTML = '<div class="no-sources">No stream sources available.</div>';
  } else {
    const counters = {};
    sources.forEach((s, i) => {
      counters[s.source] = (counters[s.source] || 0) + 1;
      const index = counters[s.source];
      const embed = `https://embedsports.top/embed/${s.source}/${s.id}/${index}`;

      const btn = document.createElement("button");
      btn.className = "ch-btn";
      btn.textContent = `${s.source.toUpperCase()} ${index}`;
      btn.onclick = () => load(embed, btn);
      if (i === 0) btn.classList.add("active");
      grid.appendChild(btn);
    });

    load(
      `https://embedsports.top/embed/${sources[0].source}/${sources[0].id}/1`,
      grid.firstChild
    );
  }
</script>
</body>
</html>
